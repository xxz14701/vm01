<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機掃描大師 - 銀髮族教學系統</title>
    
    <!-- 使用 Emoji 作為 Favicon 避免 404 錯誤 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">

    <!-- 引入 React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #0f172a;
        }
        .animate-scan {
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-10%); }
            50% { transform: translateY(110%); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        /**
         * 修正 ICON_PATHS：
         * 當一個圖標包含多個 SVG 元素時，必須使用 <g> 或 <> 包裹，
         * 否則 Babel 會拋出 Adjacent JSX elements 錯誤。
         */
        const ICON_PATHS = {
            'utensils': <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
            'user-plus': <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="16" x2="22" y1="11" y2="11"/></g>,
            'hospital': <path d="M12 6v4M10 8h4M18 22V7a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v15M21 22H3" />,
            'smartphone': <g><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01" /></g>,
            'zap': <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
            'zap-off': <g><line x1="2" x2="22" y1="2" y2="22"/><polyline points="12.41 6.75 13 2 10.57 4.92"/><polyline points="18.57 12.91 21 10 15.66 10"/><polyline points="8 8 3 14 12 14 11 22 16 16"/></g>,
            'move': <g><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></g>,
            'alert-triangle': <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3ZM12 9v4M12 17h.01" />,
            'check-circle-2': <g><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></g>,
            'chevron-left': <path d="m15 18-6-6 6-6" />,
            'user': <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
            'minus': <line x1="5" x2="19" y1="12" y2="12" />,
            'plus': <g><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></g>
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {ICON_PATHS[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState(0); 
            const [scenario, setScenario] = useState(null);
            const [feedback, setFeedback] = useState('請將鏡頭對準下方的黑白方塊');
            const [isStable, setIsStable] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);
            const [showScamAlert, setShowScamAlert] = useState(false);
            const [cartCount, setCartCount] = useState(0);

            const scenarios = [
                { id: 'food', name: '餐廳點餐', icon: 'utensils', color: 'bg-orange-500', description: '現在很多餐廳都要掃碼看菜單，練習在燈光昏暗時操作。', isDark: true },
                { id: 'social', name: '加 LINE 好友', icon: 'user-plus', color: 'bg-green-600', description: '認識新朋友時，掃描對方的行動條碼就能加好友。', isDark: false },
                { id: 'hospital', name: '醫院報到', icon: 'hospital', color: 'bg-blue-600', description: '到醫院看診或領藥，掃描單據可快速報到或查資訊。', isDark: false },
            ];

            useEffect(() => {
                if (step === 2) {
                    if (scenario?.isDark && !isFlashlightOn) {
                        setFeedback('這裡太暗了！請點擊右下方按鈕開啟補光燈');
                        setIsStable(false);
                        return;
                    }

                    const timer = setTimeout(() => {
                        setFeedback('捕捉到代碼！請保持手部穩定不要晃動...');
                        setIsStable(true);
                        
                        setTimeout(() => {
                            if (Math.random() > 0.8) {
                                setShowScamAlert(true);
                            } else {
                                setStep(3);
                            }
                        }, 2000);
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [step, isFlashlightOn, scenario]);

            const handleSelectScenario = (s) => {
                setScenario(s);
                setStep(1);
                setCartCount(0);
                setIsFlashlightOn(false);
                setShowScamAlert(false);
            };

            const renderVirtualApp = () => {
                switch (scenario?.id) {
                    case 'food':
                        return (
                            <div className="flex flex-col h-full bg-white text-slate-900 overflow-hidden">
                                <div className="bg-orange-500 p-4 text-white flex items-center gap-2">
                                    <Icon name="utensils" />
                                    <h3 className="text-xl font-bold">點餐系統</h3>
                                </div>
                                <div className="flex-1 p-5 space-y-4 overflow-y-auto">
                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-lg text-yellow-800 font-bold">💡 掃描成功！請選擇餐點：</div>
                                    <div className="border-2 border-gray-100 rounded-2xl p-4 flex flex-col gap-4 shadow-sm">
                                        <div className="flex gap-4 items-center">
                                            <div className="w-20 h-20 bg-gray-200 rounded-xl flex items-center justify-center text-[10px] text-gray-500 font-bold text-center p-2 leading-tight">牛肉麵圖片</div>
                                            <div className="flex-1">
                                                <h4 className="font-bold text-xl leading-none">古早味牛肉麵</h4>
                                                <p className="text-orange-600 font-black text-lg mt-1">$160</p>
                                            </div>
                                        </div>
                                        <div className="flex justify-end items-center gap-3">
                                            <button onClick={() => setCartCount(Math.max(0, cartCount-1))} className="p-3 bg-gray-200 rounded-full active:bg-gray-300"><Icon name="minus" size={24}/></button>
                                            <span className="text-3xl font-black w-8 text-center">{cartCount}</span>
                                            <button onClick={() => setCartCount(cartCount+1)} className="p-3 bg-gray-200 rounded-full active:bg-gray-300"><Icon name="plus" size={24}/></button>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-5 border-t bg-gray-50">
                                    <button onClick={() => setStep(0)} className="w-full bg-orange-600 text-white py-5 rounded-2xl text-2xl font-black shadow-xl active:scale-95 transition-transform">
                                        確認點餐 (${cartCount * 160})
                                    </button>
                                </div>
                            </div>
                        );
                    case 'social':
                        return (
                            <div className="flex flex-col h-full bg-[#1c1c1c]">
                                <div className="bg-[#00c300] p-4 text-white flex justify-between items-center">
                                    <button onClick={() => setStep(0)}><Icon name="chevron-left" size={32} /></button>
                                    <h3 className="text-2xl font-bold">加入好友</h3>
                                    <div className="w-8"></div>
                                </div>
                                <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-8">
                                    <div className="w-32 h-32 bg-gray-500 rounded-full border-4 border-[#00c300] flex items-center justify-center shadow-2xl">
                                        <Icon name="user" size={80} className="text-white" />
                                    </div>
                                    <div className="text-center">
                                        <h4 className="text-3xl font-bold text-white tracking-tight">快樂班 - 陳大姐</h4>
                                        <p className="text-gray-500 text-lg mt-2">LINE ID: sister-chen</p>
                                    </div>
                                    <div className="w-full space-y-4">
                                        <button onClick={() => setStep(0)} className="w-full bg-[#00c300] text-white py-5 rounded-2xl text-2xl font-black shadow-lg active:opacity-80">加入好友</button>
                                        <button onClick={() => setStep(0)} className="w-full bg-white/10 text-white py-4 rounded-2xl text-xl font-bold active:bg-white/20">封鎖</button>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'hospital':
                        return (
                            <div className="flex flex-col h-full bg-slate-50 text-slate-900">
                                <div className="bg-blue-800 p-4 text-white flex items-center gap-2 shadow-lg">
                                    <Icon name="hospital" />
                                    <h3 className="text-xl font-bold">掛號報到系統</h3>
                                </div>
                                <div className="flex-1 p-6 flex flex-col justify-center">
                                    <div className="bg-white border-2 border-blue-100 rounded-[2rem] p-8 shadow-2xl space-y-8 text-center">
                                        <div className="space-y-3">
                                            <span className="px-4 py-1 bg-green-100 text-green-700 rounded-full text-lg font-bold">掃描識別成功</span>
                                            <h4 className="text-4xl font-black text-blue-900">03 診間</h4>
                                            <p className="text-2xl text-blue-600 font-bold leading-tight">家庭醫學科<br/>王醫師</p>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200">
                                            <p className="text-gray-500 text-lg">您的掛號序號</p>
                                            <p className="text-6xl font-black text-slate-800 my-2">12</p>
                                            <p className="text-lg text-red-500 font-bold">目前看診：08 號</p>
                                        </div>
                                        <button onClick={() => setStep(0)} className="w-full bg-blue-700 text-white py-6 rounded-2xl text-2xl font-black shadow-xl active:bg-blue-800">完成報到</button>
                                    </div>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center p-4 md:p-10 select-none overflow-hidden">
                    <div className="w-full max-w-md text-center mb-6">
                        <h1 className="text-4xl font-black text-yellow-400 drop-shadow-md tracking-tight">手機掃描大師</h1>
                        <p className="text-gray-400 mt-2 text-lg font-bold">簡單、安全、好上手</p>
                    </div>

                    <div className="relative w-full max-w-[340px] aspect-[9/19] bg-black rounded-[3.5rem] border-[10px] border-gray-800 overflow-hidden shadow-2xl ring-4 ring-gray-700/30">
                        {step === 0 && (
                            <div className="flex flex-col h-full p-6 overflow-y-auto">
                                <h2 className="text-xl font-bold my-6 text-center text-white/90 underline decoration-yellow-500 decoration-4 underline-offset-4">想練習哪種情境？</h2>
                                <div className="space-y-4 pb-4">
                                    {scenarios.map((s) => (
                                        <button key={s.id} onClick={() => handleSelectScenario(s)} className={`${s.color} flex flex-col p-5 rounded-[2rem] shadow-lg active:scale-95 transition-transform text-left w-full border-b-4 border-black/20`}>
                                            <div className="flex items-center gap-4 mb-2">
                                                <div className="bg-white/30 p-2.5 rounded-2xl"><Icon name={s.icon} size={28} /></div>
                                                <span className="text-xl font-black tracking-tight">{s.name}</span>
                                            </div>
                                            <p className="text-white/90 text-sm leading-tight font-medium">{s.description}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 1 && (
                            <div className="flex flex-col items-center justify-center h-full p-8 text-center space-y-10">
                                <div className="relative">
                                    <Icon name="smartphone" size={120} className="text-blue-400" />
                                    <div className="absolute -right-4 -top-4 bg-yellow-500 rounded-full w-12 h-12 flex items-center justify-center text-black font-black text-xl border-4 border-black">1</div>
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-2xl font-black underline decoration-yellow-500 underline-offset-8">練習：{scenario?.name}</h2>
                                    <p className="text-lg text-gray-200 leading-relaxed font-bold">請雙手拿穩手機，距離條碼約 <span className="text-yellow-400 text-2xl font-black">一個手掌</span> 寬。</p>
                                </div>
                                <button onClick={() => setStep(2)} className="w-full bg-yellow-500 text-black font-black py-5 rounded-3xl text-xl shadow-2xl active:scale-95 transition-all">啟動相機</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className={`relative h-full w-full transition-colors duration-1000 ${scenario?.isDark && !isFlashlightOn ? 'bg-black' : 'bg-slate-800'}`}>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <div className={`w-56 h-56 border-[4px] rounded-[2.5rem] flex items-center justify-center transition-all duration-500 relative overflow-hidden ${isStable ? 'border-green-500 scale-105 shadow-[0_0_40px_rgba(34,197,94,0.6)]' : 'border-white border-dashed opacity-60'}`}>
                                        <div className={`w-40 h-40 flex flex-wrap ${scenario?.isDark && !isFlashlightOn ? 'opacity-0' : 'opacity-100'}`}>
                                            {[...Array(16)].map((_, i) => (
                                                <div key={i} className={`w-1/4 h-1/4 ${Math.random() > 0.5 ? 'bg-white/40' : ''}`} />
                                            ))}
                                        </div>
                                        <div className="absolute top-0 left-0 w-full h-1 bg-green-400/50 animate-scan"></div>
                                        {!isStable && <Icon name="move" size={50} className="absolute text-white/50 animate-pulse" />}
                                    </div>
                                    <div className="mt-12 bg-black/80 px-6 py-5 rounded-2xl mx-6 border-2 border-white/10 text-center shadow-2xl">
                                        <p className={`text-xl font-black leading-tight ${isStable ? 'text-green-400' : 'text-white'}`}>{feedback}</p>
                                    </div>
                                    <button onClick={() => setIsFlashlightOn(!isFlashlightOn)} className={`absolute bottom-16 right-6 p-5 rounded-full shadow-2xl transition-all active:scale-75 ${isFlashlightOn ? 'bg-yellow-400 text-black' : 'bg-white/10 text-white backdrop-blur-md'}`}>
                                        <Icon name={isFlashlightOn ? "zap" : "zap-off"} size={32} />
                                        <span className="absolute -top-7 left-1/2 -translate-x-1/2 text-[10px] font-black bg-black/50 px-2 rounded whitespace-nowrap">補光燈</span>
                                    </button>
                                </div>
                                {showScamAlert && (
                                    <div className="absolute inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
                                        <div className="bg-white rounded-[2rem] p-6 text-slate-900 space-y-5 border-[6px] border-red-500 shadow-2xl">
                                            <div className="flex flex-col items-center gap-2 text-red-600 text-center">
                                                <Icon name="alert-triangle" size={60} className="animate-bounce" />
                                                <h4 className="text-3xl font-black">恭喜中獎！</h4>
                                            </div>
                                            <p className="text-xl font-bold text-center leading-tight text-slate-700">您獲得了 <span className="text-red-600 text-2xl">$10,000</span> 元獎金！</p>
                                            <div className="space-y-3 pt-2">
                                                <button onClick={() => {setShowScamAlert(false); setStep(0);}} className="w-full bg-red-600 text-white py-4 rounded-xl text-xl font-black active:bg-red-700">⚠️ 這是詐騙，我不點！</button>
                                                <button onClick={() => {setShowScamAlert(false); setStep(0);}} className="w-full bg-gray-100 text-gray-500 py-3 rounded-xl text-lg font-bold">關閉視窗，保護自己</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 3 && (
                            <div className="flex flex-col items-center justify-center h-full p-10 text-center bg-green-950/90">
                                <div className="bg-green-500 p-6 rounded-full shadow-[0_0_50px_rgba(34,197,94,0.8)] mb-6">
                                    <Icon name="check-circle-2" size={100} className="text-white" />
                                </div>
                                <h2 className="text-4xl font-black">對焦完成</h2>
                                <p className="text-xl text-green-300 mt-4 mb-10 font-bold">正在進入系統...</p>
                                <button onClick={() => setStep(4)} className="w-full bg-white text-black font-black py-5 rounded-2xl text-xl shadow-2xl active:bg-gray-100">看結果 〉</button>
                            </div>
                        )}

                        {step === 4 && renderVirtualApp()}
                    </div>

                    <div className="mt-8 max-w-md w-full">
                        <div className="bg-blue-600/10 border-l-8 border-blue-500 p-5 rounded-r-[2rem] shadow-inner">
                            <p className="text-blue-100 text-lg leading-snug italic font-medium">
                                <strong className="text-blue-400 text-xl font-black italic not-italic">💡 講師心法：</strong><br/>
                                <span className="mt-1 block">長輩們，如果掃不到，試著將手機「慢慢往後退」。這是在練習對焦！</span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
